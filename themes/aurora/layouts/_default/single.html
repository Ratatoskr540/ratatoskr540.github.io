{{ define "main" }}

<a href="{{ "/posts/" | relURL }}" class="back-link">← Posts</a>

<article>
  <header class="post-header">
    <h1 class="post-title aurora-text-static">{{ .Title }}</h1>
    <div class="post-meta">
      <span>{{ .Date.Format "January 2, 2006" }}</span>
      <span>{{ .ReadingTime }} min read</span>
      {{ with .Params.tags }}
      <span>{{ range . }}{{ partial "tag.html" . }}{{ end }}</span>
      {{ end }}
    </div>
  </header>

  <div class="post-content">
    {{ .Content }}
  </div>
</article>

{{ end }}
